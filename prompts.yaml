prompts:
  - id: raw
    name: Direct Chat
    description: Talk directly to the LLM - your text goes straight to the model
    system_prompt: ""
    icon: 💬

  - id: fix_grammar
    name: Fix Grammar
    description: Fix only grammar, spelling, and punctuation
    system_prompt: >
      Fix only the grammar, spelling, and punctuation of the text.
      Do not reword, rephrase, restructure, or change the style, tone, or
      vocabulary. Change a word only when it is grammatically wrong.
      If the text is already correct, return it exactly as it is.
    icon: ✓

  - id: improve_text
    name: Improve Writing
    description: Make it clearer and easier to read
    system_prompt: >
      Rewrite the text so it reads more clearly and naturally.
      Fix awkward phrasing, tighten wordy parts, and improve the flow.
      Keep the original meaning, tone, and language.
      Do not add new ideas or change the facts.
    icon: ✨

  - id: summarize
    name: Summarize
    description: Shorten to the key points
    system_prompt: >
      Summarize the text in about one third of its length.
      Keep the main ideas and the important details.
      Do not add opinions or new information.
    icon: 📝

  - id: expand
    name: Expand
    description: Add helpful detail and context
    system_prompt: >
      Expand the text with helpful detail, context, and examples.
      Keep the same tone and meaning.
      Do not change the original facts or add unrelated ideas.
    icon: 📖

  - id: simplify
    name: Simplify
    description: Make it easy for anyone to read
    system_prompt: >
      Rewrite the text so it is easy to read at about an 8th-grade level.
      Use short sentences and simple, everyday words.
      Keep all the meaning. Do not leave anything important out.
    icon: 💡

  - id: professional
    name: Make Professional
    description: Polished, business-ready tone
    system_prompt: >
      Rewrite the text in a polished, professional tone for business use.
      Keep it clear and direct.
      Remove slang, casual phrases, and emojis.
      Keep the original meaning.
    icon: 💼

  - id: fact_check
    name: Fact Check
    description: Check claims and flag problems
    system_prompt: >
      Check the text for factual and logical problems.
      List each claim, say whether it looks correct, questionable, or wrong,
      and note anything missing or unsupported.
      Be brief and clear.
    icon: 🔍

  - id: make_concise
    name: Make Concise
    description: Cut the fluff, keep the meaning
    system_prompt: >
      Make the text shorter while keeping every important point.
      Cut filler, repetition, and weak words.
      Keep the meaning and tone. Aim for about half the length.
    icon: ⚡

  - id: one_line_summary
    name: One Line Summary
    description: Condense to a single sentence
    system_prompt: >
      Summarize the whole text in one clear, complete sentence.
      Be specific, not vague.
    icon: 📌

  - id: summarize_persian
    name: Summarize & Translate to Persian
    description: Summarize, then translate to Persian (Farsi)
    system_prompt: >
      Summarize the text in about one third of its length, then translate that
      summary into natural, fluent Persian (Farsi).
      Use correct Persian script and grammar.
      Return only the Persian summary.
    icon: 🇮🇷
